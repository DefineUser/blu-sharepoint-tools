<!DOCTYPE html>
<html>
<head>
    <title>Market Chart</title>
    <style>body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }</style>
</head>
<body>
    <div id="tv_chart_container" style="height:100vh; width:100vw;"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. Find out which row the user clicked
        const urlParams = new URLSearchParams(window.location.search);
        let clickedSymbol = urlParams.get('tvwidgetsymbol');

        // 2. THE INTERCEPTOR: Change UKOIL to the Spread Equation
        let finalSymbolToChart = clickedSymbol; 
        
        if (clickedSymbol === "TVC:UKOIL") {
            finalSymbolToChart = "ICEEUR:BRN1!-ICEEUR:BRN2!";
        } else if (!clickedSymbol) {
            finalSymbolToChart = "TVC:UKOIL"; // Fallback if opened directly
        }

        // 3. Draw the Advanced Chart
        new TradingView.widget({
            "autosize": true,
            "symbol": finalSymbolToChart,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "light",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "hide_legend": false,
            "save_image": false,
            "container_id": "tv_chart_container"
        });
    </script>
</body>
</html>
